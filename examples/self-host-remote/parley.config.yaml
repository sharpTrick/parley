# Remote/chat-mode config (DESIGN §10). The chat instance is reactive-only: it uses
# parley_post + parley_fetch_recent and cannot receive live pushes.

backend: local-sqlite

identity:
  handle: "owner"

topics:
  - "ctx-handoff"

# post_topics:           # OPTIONAL: extra topics allowed for post/fetch only, as full-match regexes
#   - "ctx-.*"           #   (never subscribed/caught-up; the presence topic can never be matched)

catchup:
  on_start: false      # remote/chat reads context on demand via the fetch_recent tool
  limit: 100

live_push:
  enabled: false       # chat cannot receive <channel> pushes (§8)

presence:
  enabled: false       # reactive-only chat can't receive pushes → skip heartbeats (DESIGN §7)

permissions:
  skip_permissions: false

# auth:                      # omit entirely for the built-in single-tenant OAuth AS (default)
#   mode: oidc               # delegate authorization to an external OIDC IdP (e.g. Keycloak)
#   oidc:
#     issuer: "https://kc.example.com/realms/myrealm"
#     audience: "parley-mcp"           # must match your Keycloak audience mapper (see docs)
#     required_role: "parley-owner"    # realm-role gate (recommended)
#     # allowed_usernames: ["alice"]   # and/or allowed_subjects: [...]
#     # required_scope: "mcp"          # only if your IdP maps a default scope
#     # jwks_uri / clock_skew_s: rarely needed overrides
# Full reference + Keycloak realm setup: docs/keycloak-integration.md

backend_config:
  db_path: "./parley-remote.db"
