# Maintainer-facing throwaway infra for developing/testing the network backends (DESIGN §15).
# This is "how we test", NOT a production recipe — each network plugin's own README points at the
# canonical upstream Docker setup. Bring up only the service you're working on, e.g.:
#   docker compose -f examples/dev-compose/docker-compose.yml up redis
#   docker compose -f examples/dev-compose/docker-compose.yml up nats
name: parley-dev

services:
  # --- v0.3 Redis (Streams: XADD id = cursor, XRANGE = fetchRecent, XREAD BLOCK = subscribe) ---
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "no", "--save", ""]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10

  # --- v0.5 NATS (subject = topic, JetStream seq = cursor, subscribe = wildcard) ---
  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"] # -js enables JetStream; -m exposes monitoring on 8222
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 2s
      timeout: 3s
      retries: 10

  # --- v0.6 Postgres (BIGSERIAL seq = cursor, LISTEN/NOTIFY = subscribe) ---
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: parley
      POSTGRES_PASSWORD: parley
      POSTGRES_DB: parley
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parley"]
      interval: 2s
      timeout: 3s
      retries: 10

  # --- v0.6 Zulip (stream+topic = topic, message id = cursor, event queue = subscribe) ---
  # Zulip's self-host stack is multi-container and config-heavy; per DESIGN §15 we do NOT
  # author it here. Use the canonical upstream setup: https://github.com/zulip/docker-zulip
  # then run the gated real-server suite with PARLEY_ZULIP_URL / _EMAIL / _API_KEY set.
  # (The bridge-zulip conformance tests run against an in-process fake by default, no server
  # needed. Discord/Telegram/Slack are hosted SaaS — nothing to compose; their suites also
  # run against in-process fakes.)

  # --- v0.4 Matrix / Synapse (room = topic, sync token = cursor, sync loop = subscribe) ---
  # FIRST RUN (one-time): generate config before `up`:
  #   docker compose -f examples/dev-compose/docker-compose.yml run --rm \
  #     -e SYNAPSE_SERVER_NAME=parley.local -e SYNAPSE_REPORT_STATS=no synapse generate
  # then enable a registration_shared_secret in synapse-data/homeserver.yaml, and `up synapse`.
  synapse:
    image: matrixdotorg/synapse:latest
    environment:
      SYNAPSE_SERVER_NAME: parley.local
      SYNAPSE_REPORT_STATS: "no"
    volumes:
      - synapse-data:/data
    ports:
      - "8008:8008"

  # --- post-v1 Keycloak (external-OIDC auth mode for remote/chat; docs/keycloak-integration.md) ---
  # Imports the throwaway `parley` realm: users parley/parleypass (has the parley-owner role) and
  # stranger/parleypass (doesn't), plus the parley-aud audience-mapper scope on client parley-test.
  # Gated test: packages/bridge-core/src/auth/keycloak.e2e.test.ts (PARLEY_KEYCLOAK_URL overrides).
  keycloak:
    image: quay.io/keycloak/keycloak:26.3
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    volumes:
      - ./keycloak/parley-realm.json:/opt/keycloak/data/import/parley-realm.json:ro
    ports:
      - "8080:8080"
    healthcheck:
      # The image ships no curl/wget; bash's /dev/tcp probe is the standard trick.
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 5s
      timeout: 3s
      retries: 30

  # --- v0.5 XMPP / Prosody (MUC = topic, MAM = fetchRecent/cursor, PubSub = subscribe) ---
  # MAM MUST be enabled or catch-up has no archive to read — see prosody/prosody.cfg.lua.
  prosody:
    image: prosody/prosody:latest
    volumes:
      - ./prosody/prosody.cfg.lua:/etc/prosody/prosody.cfg.lua:ro
      - prosody-data:/var/lib/prosody
    ports:
      - "5222:5222" # c2s
      - "5269:5269" # s2s

volumes:
  synapse-data:
  prosody-data:
