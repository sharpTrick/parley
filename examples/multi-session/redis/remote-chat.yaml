identity:
  handle: "owner"
topics:
  - "ctx-payments"
  - "ctx-infra"
# post_topics:             # OPTIONAL: let chat post to ad-hoc topics it doesn't subscribe to
#   - "ctx-.*"             #   full-match regexes; post/fetch only, never subscribed
catchup:
  on_start: false
  limit: 100
live_push:
  enabled: false
presence:
  enabled: false          # reactive-only chat can't receive pushes → skip heartbeats (DESIGN §7)
permissions:
  skip_permissions: false

backend: local-redis
backend_config:
  url: "redis://redis.internal:6379"   # identical to both code-agent-*.yaml
  key_prefix: "parley:"                 # identical
  block_ms: 2000                        # unused here (live_push is off) but harmless
  retention_days: 30                    # identical
