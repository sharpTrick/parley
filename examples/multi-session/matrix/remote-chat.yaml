identity:
  handle: "owner"                          # ignored by Matrix's post() — the account below is what matters.
topics:
  - "ctx-payments"
  - "ctx-infra"
# post_topics:             # OPTIONAL: let chat post to ad-hoc topics it doesn't subscribe to
#   - "ctx-.*"             #   full-match regexes; post/fetch only, never subscribed
catchup:
  on_start: false
  limit: 100
live_push:
  enabled: false
presence:
  enabled: false          # reactive-only chat can't receive pushes → skip heartbeats (DESIGN §7)
permissions:
  skip_permissions: false

backend: local-matrix
backend_config:
  homeserver_url: "https://matrix.internal:8008"   # identical to both code-agent-*.yaml
  server_name: "parley.local"                        # identical
  # Its own account too — so a transcript can distinguish "the chat/remote side posted this"
  # from either Code session, exactly like agent-a/agent-b use distinct accounts from each other.
  user: "parley-owner"
  password: "change-me-owner"
  sync_timeout_ms: 25000
