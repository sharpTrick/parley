identity:
  handle: "owner"
topics:
  - "ctx-payments"
  - "ctx-infra"
# post_topics:             # OPTIONAL: let chat post to ad-hoc topics it doesn't subscribe to
#   - "ctx-.*"             #   full-match regexes; post/fetch only, never subscribed
catchup:
  on_start: false
  limit: 100
live_push:
  enabled: false
presence:
  enabled: false          # reactive-only chat can't receive pushes → skip heartbeats (DESIGN §7)
permissions:
  skip_permissions: false

backend: local-nats
backend_config:
  servers: "nats.internal:4222"   # identical to both code-agent-*.yaml
  subject_prefix: "parley."       # identical
  stream_prefix: "PARLEY_"        # identical
  retention_days: 30               # identical
